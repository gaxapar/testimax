title: 💢 Насколько ты токсик?
photo: 5Jru9kW2xL2RsZr4hprw0B3IWa2qr036Kg0uwDYBILy7L24STv5/q7TSfRyA5pRQEZeWGjnQTc2HYjGABLPjZ0Vq/BbNP7jRUot0mT00D/k=

description: |
  <i><b>💢 Насколько ты токсик?</b></i>

  Давай узнаем, насколько ты токсик! В нашем тесте 6 вопросов, которые помогут определить твой уровень токсичности в общении.

results:
  - slug: non_toxic
    photo: ""
    description: |
      <b>🌿 Абсолютно не токсик</b>

      Ты спокойный, доброжелательный и умеешь решать конфликты без агрессии. С тобой легко и комфортно общаться.

  - slug: low_toxic
    photo: ""
    description: |
      <b>🙂 Слабая токсичность</b>

      Иногда ты можешь обидеться или ответить резко, но в целом стараешься сохранять баланс и не вредить другим.

  - slug: medium_toxic
    photo: ""
    description: |
      <b>😏 Умеренный токсик</b>

      Ты часто реагируешь эмоциями и можешь быть саркастичным или обидчивым в споре.

  - slug: high_toxic
    photo: ""
    description: |
      <b>🔥 Сильный токсик</b>

      Ты легко включаешься в конфликт, можешь давить на людей и не всегда контролируешь эмоции.

  - slug: extreme_toxic
    photo: ""
    description: |
      <b>☠️ Максимальный токсик</b>

      Ты часто провоцируешь конфликты, используешь сарказм и давление. Общение с тобой бывает непростым.


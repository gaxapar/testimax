    description: |
      <b>😐 Серьёзный человек</b>

      Ты редко «клоуничешь». Предпочитаешь спокойствие, контроль и сдержанность.

  - slug: casual_funny
    photo: ""
    description: |
      <b>🙂 Лёгкий юморист</b>

      Ты умеешь шутить, но не перегибаешь. Баланс между серьёзностью и весельем.

  - slug: party_clown
    photo: ""
    description: |
      <b>🎉 Клоун вечеринки</b>

      Ты душа компании. Любишь внимание, юмор и всегда поднимаешь настроение.

  - slug: chaos_clown
    photo: ""
    description: |
      <b>🔥 Хаос-клоун</b>

      Ты непредсказуемый, шумный и очень смешной. С тобой никогда не скучно.

  - slug: professional_clown
    photo: ""
    description: |
      <b>🎭 Профессиональный клоун</b>

      Ты живёшь юмором. Твои шутки, мемы и поведение — это отдельное шоу.


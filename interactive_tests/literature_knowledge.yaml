    description: |
      <b>✨ Любитель литературы</b>

      Ты хорошо ориентируешься в классике и уверенно отвечаешь на большинство вопросов.

  - slug: literature_expert
    photo: ""
    description: |
      <b>🎓 Литературный эксперт</b>

      Ты отлично знаешь русскую литературу, её авторов и произведения. У тебя глубокие знания!


slug: can_you_be_trusted
title: 🤝 Можно ли тебе доверять?
photo: 6gPgNgGDq2Q14vPEsNoiLY0KJB3PBTgURMrlArQdLTWJtc0+KYPWBfK9mjduQIttKr3u0/nmC/9mlZGuh4bRNjyJyfv5/3VkHYTA2ytibmE=

description: |
  <i><b>🤝 Можно ли тебе доверять?</b></i>

  Давай узнаем, насколько тебе доверяют люди! В нашем тесте 7 вопросов, которые помогут определить твой уровень надёжности и доверия.

results:
  - slug: highly_trusted
    photo: ""
    description: |
      <b>🕊️ Абсолютно надёжный человек</b>

      Тебе полностью доверяют люди. Ты умеешь хранить секреты, держишь слово и всегда остаёшься верным своим принципам.

  - slug: trusted
    photo: ""
    description: |
      <b>🤍 Надёжный человек</b>

      Тебе в целом доверяют. Иногда бывают мелкие сомнения, но ты обычно ответственный и честный.

  - slug: moderate_trust
    photo: ""
    description: |
      <b>🙂 Умеренное доверие</b>

      Люди доверяют тебе, но не всегда полностью уверены. Иногда ты можешь быть непредсказуем в словах или действиях.

  - slug: low_trust
    photo: ""
    description: |
      <b>⚠️ Низкий уровень доверия</b>

      Людям сложно полностью положиться на тебя. Иногда ты можешь нарушать обещания или делиться лишним.

  - slug: untrusted
    photo: ""
    description: |
      <b>🚫 Тебе не очень доверяют</b>

      Тебе редко доверяют секреты и важные дела. Люди опасаются, что информация может стать известной другим.


description: |
  <i><b>💕 Какой ты в отношениях?</b></i>

  Давай узнаем, какой ты в отношениях! В нашем тесте 8 вопросов, которые помогут определить твой стиль поведения в любви и паре.

results:
  - slug: romantic_partner
    photo: ""
    description: |
      <b>💖 Романтичный партнёр</b>

      Ты нежный, внимательный и заботливый человек. Для тебя важны чувства, эмоции и близость.

  - slug: loyal_partner
    photo: ""
    description: |
      <b>🤍 Верный партнёр</b>

      Ты стабильный, надёжный и преданный человек. На тебя можно положиться в любых ситуациях.

  - slug: passionate_partner
    photo: ""
    description: |
      <b>🔥 Страстный партнёр</b>

      Ты эмоциональный, яркий и глубоко вовлечённый в отношения человек. У тебя сильные чувства и энергия.

  - slug: independent_partner
    photo: ""
    description: |
      <b>🌙 Независимый партнёр</b>

      Ты ценишь личное пространство и свободу, но при этом умеешь быть в отношениях без потери себя.

  - slug: balanced_partner
    photo: ""
    description: |
      <b>🌿 Гармоничный партнёр</b>

      Ты умеешь сохранять баланс между чувствами, разумом и личным пространством. С тобой спокойно и комфортно.

  - slug: jealous_partner
    photo: ""
    description: |
      <b>💔 Ревнивый партнёр</b>

      Ты эмоционально реагируешь и иногда склонен к ревности, потому что сильно привязываешься к людям.

  - slug: leader_partner
    photo: ""
    description: |
      <b>👑 Доминирующий партнёр</b>

      Ты берёшь инициативу в отношениях и часто принимаешь решения за двоих.


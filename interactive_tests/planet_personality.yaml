  <i><b>Какая ты планета?</b></i>

  Давай узнаем, какая ты планета? В нашем тесте 8 вопросов, которые помогут нам определить, какая ты планета.

results:
  - slug: mars_planet
    photo: ""
    description: |
      <b>🔴 Марс</b>

      Ты энергичный, смелый и любишь движение. В тебе много драйва и лидерской энергии.

  - slug: venus_planet
    photo: ""
    description: |
      <b>🌸 Венера</b>

      Ты мягкий, добрый и эмоциональный человек. Людям рядом с тобой спокойно и тепло.

  - slug: saturn_planet
    photo: ""
    description: |
      <b>🪐 Сатурн</b>

      Ты спокойный, глубокий и любишь размышлять. В тебе есть загадочность и мудрость.

  - slug: mercury_planet
    photo: ""
    description: |
      <b>⚡ Меркурий</b>

      Ты быстрый, общительный и легко адаптируешься к любым ситуациям.

  - slug: neptune_planet
    photo: ""
    description: |
      <b>🌊 Нептун</b>

      Ты мечтательный, творческий и очень чувствительный к атмосфере вокруг.

  - slug: jupiter_planet
    photo: ""
    description: |
      <b>✨ Юпитер</b>

      Ты яркий, уверенный и умеешь вдохновлять окружающих своей энергией.

  - slug: uranus_planet
    photo: ""
    description: |
      <b>🌀 Уран</b>

      Ты необычный, свободолюбивый и всегда выбираешь свой собственный путь.

  - slug: earth_planet
    photo: ""
    description: |
      <b>🌍 Земля</b>

      Ты надёжный, стабильный и умеешь сохранять баланс даже в сложных ситуациях.


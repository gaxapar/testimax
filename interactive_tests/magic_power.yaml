description: |
  <i><b>Какая у тебя магическая сила?</b></i>

  Давай узнаем, какая у тебя магическая сила? В нашем тесте 10 вопросов, которые помогут нам определить, какая у тебя магическая сила.

results:
  - slug: fire_magic
    photo: ""
    description: |
      <b>🔥 Магия огня</b>

      Ты энергичный, смелый и эмоциональный человек. В тебе много силы, драйва и лидерской энергии.

  - slug: water_magic
    photo: ""
    description: |
      <b>🌊 Магия воды</b>

      Ты спокойный, гибкий и умеешь адаптироваться к любой ситуации. Людям рядом с тобой комфортно.

  - slug: mind_magic
    photo: ""
    description: |
      <b>🧠 Магия разума</b>

      Ты умеешь анализировать, замечать детали и принимать взвешенные решения.

  - slug: light_magic
    photo: ""
    description: |
      <b>✨ Магия света</b>

      Ты добрый, позитивный и умеешь вдохновлять окружающих своим присутствием.

  - slug: shadow_magic
    photo: ""
    description: |
      <b>🌑 Магия тьмы</b>

      Ты загадочный и глубокий человек, который редко раскрывает свои настоящие эмоции.

  - slug: chaos_magic
    photo: ""
    description: |
      <b>⚡ Магия хаоса</b>

      Ты непредсказуемый, креативный и обожаешь нестандартные решения.

